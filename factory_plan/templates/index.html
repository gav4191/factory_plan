{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <div>
        <h1>План по днях</h1>
        <p class="muted">Зведення завантаження етапів після розрахунку плану.</p>
    </div>
    <div class="actions">
        <button id="recalculate-plan" type="button">Перерахувати план</button>
    </div>
</header>

<section class="panel">
    <div id="plan-status" class="status muted"></div>
    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>Етап</th>
                <th>Ємність</th>
                <th>Заплановано</th>
                <th>Перевищення</th>
                <th>Дверей</th>
            </tr>
        </thead>
        <tbody id="plan-load-body"></tbody>
    </table>
</section>
{% endblock %}

{% block scripts %}
<script>
    const columns = ["plan_date", "operation", "capacity_hours", "planned_hours", "overflow_hours", "door_count"];
    const body = document.querySelector("#plan-load-body");
    const status = document.querySelector("#plan-status");

    async function refreshPlan() {
        const rows = await FactoryPlan.loadJson("/api/plan/load");
        FactoryPlan.renderRows(body, rows, columns);
    }

    document.querySelector("#recalculate-plan").addEventListener("click", async () => {
        const result = await FactoryPlan.loadJson("/api/plan/recalculate", {method: "POST"});
        status.textContent = `Операцій: ${result.operation_count}; днів: ${result.day_count}; перевищень: ${result.overflow_count}`;
        await refreshPlan();
    });

    refreshPlan().catch(() => FactoryPlan.renderRows(body, [], columns));
</script>
{% endblock %}
