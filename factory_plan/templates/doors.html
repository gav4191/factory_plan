{% extends "base.html" %}

{% block content %}
<header class="page-header">
    <div>
        <h1>Двері</h1>
        <p class="muted">Імпортовані двері, замовлення, моделі та розміри.</p>
    </div>
</header>

<section class="panel">
    <form id="door-filters" class="filters">
        <input name="serial" placeholder="Серія">
        <input name="counterparty" placeholder="Контрагент">
        <input name="order_number" placeholder="Замовлення">
        <input name="door_type" placeholder="Тип">
        <input name="model" placeholder="Модель">
        <button type="submit">Фільтрувати</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Серія</th>
                <th>Планова дата</th>
                <th>Дата заказу</th>
                <th>Контрагент</th>
                <th>Замовлення</th>
                <th>Тип</th>
                <th>Модель</th>
                <th>Розмір</th>
                <th>Створок</th>
            </tr>
        </thead>
        <tbody id="doors-body"></tbody>
    </table>
</section>
{% endblock %}

{% block scripts %}
<script>
    const columns = ["serial", "planned_date", "order_date", "counterparty", "order_number", "door_type", "model", "size", "leaf_count"];
    const body = document.querySelector("#doors-body");

    async function refreshDoors(query = "") {
        const rows = await FactoryPlan.loadJson(`/api/doors${query}`);
        FactoryPlan.renderRows(body, rows, columns);
    }

    document.querySelector("#door-filters").addEventListener("submit", async (event) => {
        event.preventDefault();
        const params = new URLSearchParams(new FormData(event.currentTarget));
        for (const [key, value] of [...params.entries()]) {
            if (!value) {
                params.delete(key);
            }
        }
        await refreshDoors(params.toString() ? `?${params}` : "");
    });

    refreshDoors().catch(() => FactoryPlan.renderRows(body, [], columns));
</script>
{% endblock %}
